apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-pipeline-app
  labels:
    app: deploy-pipeline-app
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: deploy-pipeline-app
  template:
    metadata:
      labels:
        app: deploy-pipeline-app
    spec:
      containers:
        - name: deploy-pipeline-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          env:
            - name: APP_ENV
              value: "production"
